name: encrypted_bank_card_app
description: "Encrypted Bank Card App - Educational purposes only."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  crypto: ^3.0.6
  local_auth: ^2.3.0
  nfc_manager: ^3.5.0
  permission_handler: ^11.4.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: logo/logo.png
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: logo/logo.png
  min_sdk_android: 23
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/splash.png
    - logo/logo.png
    - splash/splash.png
